name: tugas_mobile_api
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.15.2
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  equatable: ^2.0.8
  sqflite: ^2.3.0
